services:

  nhom09_mysql:
    image: mysql:8.0
    container_name: nhom09_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tourbookingdb
      MYSQL_USER: tour_user
      MYSQL_PASSWORD: tour_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nhom09_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  nhom09_backend:
    build: ./backend
    container_name: nhom09_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://tour_user:tour_pass123@nhom09_mysql:3306/tourbookingdb
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      RAG_REDIS_ENABLED: ${RAG_REDIS_ENABLED:-true}
      RAG_REDIS_URL: ${RAG_REDIS_URL:-redis://nhom09_redis:6379/0}
    depends_on:
      nhom09_mysql:
        condition: service_healthy
      nhom09_redis:
        condition: service_started
    networks:
      - nhom09_network

  nhom09_redis:
    image: redis:7-alpine
    container_name: nhom09_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - nhom09_network

  nhom09_frontend:
    build: ./frontend
    container_name: nhom09_frontend
    ports:
      - "3000:3000"       
    environment:
      - VITE_API_URL=http://nhom09_backend:8000
    depends_on:
      - nhom09_backend
    networks:
      - nhom09_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nhom09_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: nhom09_mysql
      PMA_USER: root
      PMA_PASSWORD: root123
    depends_on:
      - nhom09_mysql
    networks:
      - nhom09_network

networks:
  nhom09_network:

volumes:
  mysql_data:
